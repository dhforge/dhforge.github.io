<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>텍스트 정리 도구 - 공백, 빈 줄, 중복 줄 제거</title>
  <meta name="description" content="텍스트 정리 도구로 줄 앞뒤 공백 제거, 빈 줄 제거, 중복 줄 제거, 연속 공백 정리, 대소문자 변환을 무료로 처리하세요.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://dhforge.github.io/text-cleaner/">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark" aria-hidden="true"></span><span><strong>무료 도구함</strong><small>텍스트 정리 도구</small></span></a>
    <nav class="top-nav" aria-label="주요 링크"><a href="../privacy.html">개인정보처리방침</a><a href="../terms.html">이용 안내</a><a href="../contact.html">문의</a></nav>
  </header>
  <main class="tool-shell">
    <aside class="tool-nav" aria-label="도구 목록">
      <a class="tool-tab" href="../char-counter/">글자 수 계산기</a>
      <a class="tool-tab" href="../date-calculator/">날짜 계산기</a>
      <a class="tool-tab" href="../unit-converter/">단위 변환기</a>
      <a class="tool-tab" href="../random-picker/">랜덤 추첨기</a>
      <a class="tool-tab" href="../qr-generator/">QR 코드 생성기</a>
      <a class="tool-tab is-active" href="../text-cleaner/">텍스트 정리 도구</a>
      <a class="tool-tab" href="../color-tool/">색상 변환기</a>
      <a class="tool-tab" href="../timer/">타이머</a>
      <a class="tool-tab" href="../ratio-calculator/">비율 계산기</a>
      <a class="tool-tab" href="../image-resizer/">이미지 리사이즈</a>
    </aside>
    <div class="tool-panels">
      <section class="tool-panel is-active">
        <div class="panel-heading">
          <div><p class="eyebrow">Text Utility</p><h1>텍스트 정리 도구</h1></div>
          <p>줄바꿈, 공백, 중복 줄, 대소문자를 빠르게 정리합니다.</p>
        </div>
        <label class="field"><span>원본 텍스트</span><textarea id="cleanInput" rows="7" placeholder="정리할 텍스트를 입력하세요."></textarea></label>
        <div class="button-row wrap">
          <button data-clean="trim-lines" type="button">줄 앞뒤 공백 제거</button>
          <button data-clean="remove-empty" type="button">빈 줄 제거</button>
          <button data-clean="dedupe" type="button">중복 줄 제거</button>
          <button data-clean="collapse-space" type="button">연속 공백 정리</button>
          <button data-clean="upper" type="button">대문자</button>
          <button data-clean="lower" type="button">소문자</button>
        </div>
        <label class="field"><span>결과</span><textarea id="cleanOutput" rows="7" readonly></textarea></label>
        <button id="copyCleanText" type="button">결과 복사</button>
      </section>
    </div>
  </main>
  <script src="../app.js" defer></script>
</body>
</html>
