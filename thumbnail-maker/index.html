<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>썸네일 크기 생성기 - SNS, 블로그, 영상 이미지 제작</title>
  <meta name="description" content="유튜브, 블로그, SNS용 썸네일 크기를 선택하고 이미지를 맞춰 저장하세요.">
  <meta name="robots" content="index,follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://dhforge.github.io/thumbnail-maker/">
  <link rel="stylesheet" href="../styles.css?v=ux-fixes-20260623">
  <meta name="color-scheme" content="light">
</head>
<body><noscript class="noscript-notice">썸네일 도구는 JavaScript가 켜져 있어야 작동합니다.</noscript>
  <header class="site-header"><a class="brand" href="../index.html"><span class="brand-mark" aria-hidden="true"></span><span><strong>무료 도구함</strong><small>썸네일 크기 생성기</small></span></a><nav class="top-nav" aria-label="주요 링크"><a href="../about.html">소개</a><a href="../privacy.html">개인정보처리방침</a><a href="../terms.html">이용 안내</a><a href="../contact.html">문의</a></nav></header>
  <main class="tool-shell">
    <aside class="tool-nav" aria-label="도구 목록"><a class="tool-tab" href="../image-resizer/">이미지 리사이즈</a><a class="tool-tab" href="../image-compressor/">이미지 압축기</a><a class="tool-tab" href="../image-converter/">이미지 포맷 변환기</a><a class="tool-tab is-active" href="../thumbnail-maker/">썸네일 크기 생성기</a><a class="tool-tab" href="../ratio-calculator/">화면 비율 계산기</a><a class="tool-tab" href="../color-tool/">색상 변환기</a><a class="tool-tab" href="../color-palette/">컬러 팔레트 생성기</a><a class="tool-tab" href="../gradient-generator/">그라데이션 생성기</a><a class="tool-tab" href="../qr-generator/">QR 코드 생성기</a><a class="tool-tab" href="../favicon-generator/">파비콘 / 앱 아이콘 생성기</a></aside>
    <div class="tool-panels">
      <section class="tool-panel is-active">
        <div class="panel-heading"><div><p class="eyebrow">Design Utility</p><h1>썸네일 크기 생성기</h1></div><p>자주 쓰는 플랫폼 크기에 맞춰 이미지를 만듭니다.</p></div>
        <div class="two-column">
          <div>
            <label class="field"><span>이미지 선택</span><input id="thumbInput" type="file" accept="image/png,image/jpeg,image/webp"></label>
            <label class="field"><span>프리셋</span><select id="thumbPreset"><option value="1280x720">유튜브 1280x720</option><option value="1200x630">블로그/OG 1200x630</option><option value="1080x1080">정사각형 1080x1080</option><option value="1080x1350">세로 피드 1080x1350</option><option value="1080x1920">스토리 1080x1920</option></select></label>
            <label class="field"><span>맞춤 방식</span><select id="thumbFit"><option value="cover">채우기</option><option value="contain">전체 보이기</option></select></label>
            <label class="field"><span>배경색</span><input id="thumbBg" type="color" value="#f6f7f9"></label>
            <button class="primary-button" id="thumbRun" type="button">썸네일 만들기</button>
            <a class="download-link" id="thumbDownload" download="thumbnail.png">결과 저장</a>
          </div>
          <div class="canvas-stage image-stage"><canvas id="thumbCanvas" width="360" height="220" aria-label="썸네일 미리보기"></canvas></div>
        </div>
      </section>
      <section class="content-panel"><h2>썸네일 크기 생성기 사용법</h2><p>플랫폼 크기를 고른 뒤 이미지를 채우거나 전체가 보이게 맞출 수 있습니다.</p><div class="related-tools"><a href="../ratio-calculator/">화면 비율 계산기</a><a href="../image-resizer/">이미지 리사이즈</a></div></section>
    </div>
  </main>
  <script src="../app.js?v=ux-fixes-20260623" defer></script>
</body>
</html>
