  <main class="policy-main"><article><p class="eyebrow">Guide</p><h1>체크리스트를 끝까지 쓰는 법</h1><p>좋은 체크리스트는 항목이 많기보다 바로 행동할 수 있게 나뉘어 있습니다. 한 줄에는 한 가지 행동만 적고, 큰 작업은 여러 개의 작은 체크로 나누는 편이 좋습니다.</p><h2>구성 팁</h2><ul><li>오늘 끝낼 수 있는 항목만 먼저 적기</li><li>준비물, 이동, 확인처럼 묶음별로 나누기</li><li>중요한 항목은 위쪽에 배치하기</li></ul><h2>출력 팁</h2><p>여행 준비물이나 장보기처럼 반복해서 쓰는 목록은 PDF로 저장해 두면 다음에도 빠르게 출력할 수 있습니다.</p></article></main>
