  <main class="policy-main"><article><p class="eyebrow">Guide</p><h1>습관 기록표를 부담 없이 쓰는 법</h1><p>습관 기록표는 빈칸을 모두 채우는 도구가 아니라 흐름을 확인하는 도구입니다. 처음에는 항목을 적게 잡아야 오래 유지하기 쉽습니다.</p><h2>추천 방식</h2><ul><li>처음에는 3개 이하의 습관만 기록하기</li><li>매일 성공 여부보다 반복 패턴 보기</li><li>한 주가 끝나면 항목을 줄이거나 바꾸기</li></ul><h2>출력 팁</h2><p>월간 기록표가 부담스럽다면 2주 단위로 출력해 보세요. 실패한 날이 적게 보이면 다시 시작하기가 쉽습니다.</p></article></main>
