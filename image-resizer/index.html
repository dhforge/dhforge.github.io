<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>이미지 리사이즈 - JPG, PNG, WebP 크기 변경</title>
  <meta name="description" content="이미지를 서버에 업로드하지 않고 브라우저에서 JPG, PNG, WebP 크기를 변경하고 저장하세요.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://dhforge.github.io/image-resizer/">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark" aria-hidden="true"></span><span><strong>무료 도구함</strong><small>이미지 리사이즈</small></span></a>
    <nav class="top-nav" aria-label="주요 링크"><a href="../privacy.html">개인정보처리방침</a><a href="../terms.html">이용 안내</a><a href="../contact.html">문의</a></nav>
  </header>
  <main class="tool-shell">
    <aside class="tool-nav" aria-label="도구 목록">
      <a class="tool-tab" href="../char-counter/">글자 수 계산기</a>
      <a class="tool-tab" href="../date-calculator/">날짜 계산기</a>
      <a class="tool-tab" href="../unit-converter/">단위 변환기</a>
      <a class="tool-tab" href="../random-picker/">랜덤 추첨기</a>
      <a class="tool-tab" href="../qr-generator/">QR 코드 생성기</a>
      <a class="tool-tab" href="../text-cleaner/">텍스트 정리 도구</a>
      <a class="tool-tab" href="../color-tool/">색상 변환기</a>
      <a class="tool-tab" href="../timer/">타이머</a>
      <a class="tool-tab" href="../ratio-calculator/">비율 계산기</a>
      <a class="tool-tab is-active" href="../image-resizer/">이미지 리사이즈</a>
    </aside>
    <div class="tool-panels">
      <section class="tool-panel is-active">
        <div class="panel-heading">
          <div><p class="eyebrow">Image Utility</p><h1>이미지 리사이즈</h1></div>
          <p>이미지를 서버에 올리지 않고 브라우저에서 크기를 줄이고 저장합니다.</p>
        </div>
        <div class="two-column">
          <div>
            <label class="field"><span>이미지 선택</span><input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp"></label>
            <div class="converter-row compact-row">
              <label class="field"><span>너비</span><input id="resizeWidth" type="number" min="1"></label>
              <label class="field"><span>높이</span><input id="resizeHeight" type="number" min="1"></label>
            </div>
            <label class="check-row"><input id="lockRatio" type="checkbox" checked> 비율 유지</label>
            <label class="field"><span>형식</span><select id="imageFormat"><option value="image/png">PNG</option><option value="image/jpeg">JPG</option><option value="image/webp">WebP</option></select></label>
            <button class="primary-button" id="resizeImage" type="button">이미지 만들기</button>
            <a class="download-link" id="downloadImage" download="resized-image.png">결과 저장</a>
          </div>
          <div class="canvas-stage image-stage"><canvas id="imageCanvas" width="320" height="220" aria-label="리사이즈 이미지 미리보기"></canvas></div>
        </div>
      </section>
    </div>
  </main>
  <script src="../app.js" defer></script>
</body>
</html>
