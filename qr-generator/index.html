<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR 코드 생성기 - URL과 텍스트 QR 무료 생성</title>
  <meta name="description" content="URL이나 짧은 텍스트를 브라우저에서 바로 QR 코드로 만들고 PNG로 저장하세요. 입력값은 서버로 전송하지 않습니다.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://dhforge.github.io/qr-generator/">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark" aria-hidden="true"></span><span><strong>무료 도구함</strong><small>QR 코드 생성기</small></span></a>
    <nav class="top-nav" aria-label="주요 링크"><a href="../privacy.html">개인정보처리방침</a><a href="../terms.html">이용 안내</a><a href="../contact.html">문의</a></nav>
  </header>
  <main class="tool-shell">
    <aside class="tool-nav" aria-label="도구 목록">
      <a class="tool-tab" href="../char-counter/">글자 수 계산기</a>
      <a class="tool-tab" href="../date-calculator/">날짜 계산기</a>
      <a class="tool-tab" href="../unit-converter/">단위 변환기</a>
      <a class="tool-tab" href="../random-picker/">랜덤 추첨기</a>
      <a class="tool-tab is-active" href="../qr-generator/">QR 코드 생성기</a>
      <a class="tool-tab" href="../text-cleaner/">텍스트 정리 도구</a>
      <a class="tool-tab" href="../color-tool/">색상 변환기</a>
      <a class="tool-tab" href="../timer/">타이머</a>
      <a class="tool-tab" href="../ratio-calculator/">비율 계산기</a>
      <a class="tool-tab" href="../image-resizer/">이미지 리사이즈</a>
    </aside>
    <div class="tool-panels">
      <section class="tool-panel is-active">
        <div class="panel-heading">
          <div><p class="eyebrow">QR Utility</p><h1>QR 코드 생성기</h1></div>
          <p>입력한 텍스트를 외부 서버로 보내지 않고 브라우저에서 QR 코드로 만듭니다.</p>
        </div>
        <div class="two-column">
          <div>
            <label class="field"><span>QR 내용</span><textarea id="qrText" rows="7" maxlength="100" placeholder="https://example.com"></textarea></label>
            <div class="button-row"><button class="primary-button" id="makeQr" type="button">QR 만들기</button><button id="downloadQr" type="button">PNG 저장</button></div>
            <p class="helper">짧은 URL이나 간단한 문장에 적합합니다. 한글은 byte 수가 커서 입력 길이가 제한될 수 있습니다.</p>
          </div>
          <div class="canvas-stage"><canvas id="qrCanvas" width="280" height="280" aria-label="생성된 QR 코드"></canvas></div>
        </div>
      </section>
    </div>
  </main>
  <script src="../app.js" defer></script>
</body>
</html>
