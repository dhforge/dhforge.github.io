<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>날짜 계산기 - 날짜 차이, 며칠 후 날짜 계산</title>
  <meta name="description" content="두 날짜 사이의 일수 차이와 기준일에서 며칠 전후 날짜를 무료로 계산하세요.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://dhforge.github.io/date-calculator/">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark" aria-hidden="true"></span><span><strong>무료 도구함</strong><small>날짜 계산기</small></span></a>
    <nav class="top-nav" aria-label="주요 링크"><a href="../privacy.html">개인정보처리방침</a><a href="../terms.html">이용 안내</a><a href="../contact.html">문의</a></nav>
  </header>
  <main class="tool-shell">
    <aside class="tool-nav" aria-label="도구 목록">
      <a class="tool-tab" href="../char-counter/">글자 수 계산기</a>
      <a class="tool-tab is-active" href="../date-calculator/">날짜 계산기</a>
      <a class="tool-tab" href="../unit-converter/">단위 변환기</a>
      <a class="tool-tab" href="../random-picker/">랜덤 추첨기</a>
      <a class="tool-tab" href="../qr-generator/">QR 코드 생성기</a>
      <a class="tool-tab" href="../text-cleaner/">텍스트 정리 도구</a>
      <a class="tool-tab" href="../color-tool/">색상 변환기</a>
      <a class="tool-tab" href="../timer/">타이머</a>
      <a class="tool-tab" href="../ratio-calculator/">비율 계산기</a>
      <a class="tool-tab" href="../image-resizer/">이미지 리사이즈</a>
    </aside>
    <div class="tool-panels">
      <section class="tool-panel is-active">
        <div class="panel-heading">
          <div><p class="eyebrow">Date Utility</p><h1>날짜 계산기</h1></div>
          <p>두 날짜 사이의 차이와 기준일에서 며칠 전후 날짜를 계산합니다.</p>
        </div>
        <div class="two-column">
          <div>
            <label class="field"><span>시작일</span><input id="dateStart" type="date"></label>
            <label class="field"><span>종료일</span><input id="dateEnd" type="date"></label>
            <output class="notice" id="dateDiffResult">날짜를 선택하세요.</output>
          </div>
          <div>
            <label class="field"><span>기준일</span><input id="dateBase" type="date"></label>
            <label class="field"><span>더하거나 뺄 일수</span><input id="dateOffset" type="number" value="30" step="1"></label>
            <output class="notice" id="dateOffsetResult">기준일을 선택하세요.</output>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script src="../app.js" defer></script>
</body>
</html>
