<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>화면 비율 계산기 - 이미지와 영상 크기 계산</title>
  <meta name="description" content="화면 비율 계산기로 이미지, 영상, 썸네일의 새 너비와 높이를 같은 비율로 무료 계산하세요.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://dhforge.github.io/ratio-calculator/">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark" aria-hidden="true"></span><span><strong>무료 도구함</strong><small>비율 계산기</small></span></a>
    <nav class="top-nav" aria-label="주요 링크"><a href="../privacy.html">개인정보처리방침</a><a href="../terms.html">이용 안내</a><a href="../contact.html">문의</a></nav>
  </header>
  <main class="tool-shell">
    <aside class="tool-nav" aria-label="도구 목록">
      <a class="tool-tab" href="../char-counter/">글자 수 계산기</a>
      <a class="tool-tab" href="../date-calculator/">날짜 계산기</a>
      <a class="tool-tab" href="../unit-converter/">단위 변환기</a>
      <a class="tool-tab" href="../random-picker/">랜덤 추첨기</a>
      <a class="tool-tab" href="../qr-generator/">QR 코드 생성기</a>
      <a class="tool-tab" href="../text-cleaner/">텍스트 정리 도구</a>
      <a class="tool-tab" href="../color-tool/">색상 변환기</a>
      <a class="tool-tab" href="../timer/">타이머</a>
      <a class="tool-tab is-active" href="../ratio-calculator/">비율 계산기</a>
      <a class="tool-tab" href="../image-resizer/">이미지 리사이즈</a>
    </aside>
    <div class="tool-panels">
      <section class="tool-panel is-active">
        <div class="panel-heading">
          <div><p class="eyebrow">Design Utility</p><h1>화면 비율 계산기</h1></div>
          <p>이미지, 영상, 썸네일 크기를 같은 비율로 계산합니다.</p>
        </div>
        <div class="converter-row">
          <label class="field"><span>원본 너비</span><input id="ratioWidth" type="number" value="1920" min="1"></label>
          <label class="field"><span>원본 높이</span><input id="ratioHeight" type="number" value="1080" min="1"></label>
          <label class="field"><span>새 너비</span><input id="ratioNewWidth" type="number" value="1280" min="1"></label>
        </div>
        <div class="result-grid compact">
          <output class="metric"><span>비율</span><strong id="ratioSimple">16:9</strong></output>
          <output class="metric"><span>새 높이</span><strong id="ratioNewHeight">720</strong></output>
          <output class="metric"><span>세로 기준 너비</span><strong id="ratioWidthFromHeight">1920</strong></output>
        </div>
        <label class="field small-field"><span>새 높이로 너비 계산</span><input id="ratioTargetHeight" type="number" value="1080" min="1"></label>
      </section>
    </div>
  </main>
  <script src="../app.js" defer></script>
</body>
</html>
