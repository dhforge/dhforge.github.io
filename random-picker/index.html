<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>랜덤 추첨기 - 이름 뽑기, 번호 추첨, 팀 나누기</title>
  <meta name="description" content="랜덤 추첨기로 이름 뽑기, 번호 추첨, 목록 섞기, 팀 나누기를 무료로 실행하세요.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://dhforge.github.io/random-picker/">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark" aria-hidden="true"></span><span><strong>무료 도구함</strong><small>랜덤 추첨기</small></span></a>
    <nav class="top-nav" aria-label="주요 링크"><a href="../privacy.html">개인정보처리방침</a><a href="../terms.html">이용 안내</a><a href="../contact.html">문의</a></nav>
  </header>
  <main class="tool-shell">
    <aside class="tool-nav" aria-label="도구 목록">
      <a class="tool-tab" href="../char-counter/">글자 수 계산기</a>
      <a class="tool-tab" href="../date-calculator/">날짜 계산기</a>
      <a class="tool-tab" href="../unit-converter/">단위 변환기</a>
      <a class="tool-tab is-active" href="../random-picker/">랜덤 추첨기</a>
      <a class="tool-tab" href="../qr-generator/">QR 코드 생성기</a>
      <a class="tool-tab" href="../text-cleaner/">텍스트 정리 도구</a>
      <a class="tool-tab" href="../color-tool/">색상 변환기</a>
      <a class="tool-tab" href="../timer/">타이머</a>
      <a class="tool-tab" href="../ratio-calculator/">비율 계산기</a>
      <a class="tool-tab" href="../image-resizer/">이미지 리사이즈</a>
    </aside>
    <div class="tool-panels">
      <section class="tool-panel is-active">
        <div class="panel-heading">
          <div><p class="eyebrow">Random Utility</p><h1>랜덤 추첨기</h1></div>
          <p>이름 뽑기, 번호 추첨, 팀 나누기를 한 화면에서 처리합니다.</p>
        </div>
        <div class="two-column">
          <div>
            <label class="field"><span>항목 목록</span><textarea id="randomItems" rows="8" placeholder="한 줄에 하나씩 입력하세요.&#10;민수&#10;지연&#10;도윤"></textarea></label>
            <div class="button-row"><button class="primary-button" id="pickOne" type="button">하나 뽑기</button><button id="shuffleItems" type="button">섞기</button></div>
          </div>
          <div>
            <label class="field"><span>팀 수</span><input id="teamCount" type="number" value="2" min="2" max="20"></label>
            <button id="makeTeams" type="button">팀 나누기</button>
            <label class="field inline-range"><span>번호 추첨</span><input id="rangeMin" type="number" value="1"><input id="rangeMax" type="number" value="100"></label>
            <button id="pickNumber" type="button">번호 뽑기</button>
          </div>
        </div>
        <output class="notice tall" id="randomResult">결과가 여기에 표시됩니다.</output>
      </section>
    </div>
  </main>
  <script src="../app.js" defer></script>
</body>
</html>
