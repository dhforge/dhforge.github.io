<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>글자 수 계산기 - 공백 포함, 공백 제외, byte 계산</title>
  <meta name="description" content="글자 수 계산기로 공백 포함 문자 수, 공백 제외 문자 수, UTF-8 byte, 단어 수, 줄 수, 예상 읽기 시간을 무료로 확인하세요.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://dhforge.github.io/char-counter/">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark" aria-hidden="true"></span><span><strong>무료 도구함</strong><small>글자 수 계산기</small></span></a>
    <nav class="top-nav" aria-label="주요 링크"><a href="../privacy.html">개인정보처리방침</a><a href="../terms.html">이용 안내</a><a href="../contact.html">문의</a></nav>
  </header>
  <main class="tool-shell">
    <aside class="tool-nav" aria-label="도구 목록">
      <a class="tool-tab is-active" href="../char-counter/">글자 수 계산기</a>
      <a class="tool-tab" href="../date-calculator/">날짜 계산기</a>
      <a class="tool-tab" href="../unit-converter/">단위 변환기</a>
      <a class="tool-tab" href="../random-picker/">랜덤 추첨기</a>
      <a class="tool-tab" href="../qr-generator/">QR 코드 생성기</a>
      <a class="tool-tab" href="../text-cleaner/">텍스트 정리 도구</a>
      <a class="tool-tab" href="../color-tool/">색상 변환기</a>
      <a class="tool-tab" href="../timer/">타이머</a>
      <a class="tool-tab" href="../ratio-calculator/">비율 계산기</a>
      <a class="tool-tab" href="../image-resizer/">이미지 리사이즈</a>
    </aside>
    <div class="tool-panels">
      <section class="tool-panel is-active">
        <div class="panel-heading">
          <div><p class="eyebrow">Text Utility</p><h1>글자 수 계산기</h1></div>
          <p>자기소개서, 블로그, SNS 문장의 글자 수와 byte를 바로 확인합니다.</p>
        </div>
        <label class="field"><span>텍스트 입력</span><textarea id="charInput" rows="10" placeholder="여기에 글을 붙여넣으세요."></textarea></label>
        <div class="result-grid">
          <output class="metric"><span>공백 포함</span><strong id="charWithSpaces">0</strong></output>
          <output class="metric"><span>공백 제외</span><strong id="charNoSpaces">0</strong></output>
          <output class="metric"><span>UTF-8 byte</span><strong id="charBytes">0</strong></output>
          <output class="metric"><span>단어 수</span><strong id="wordCount">0</strong></output>
          <output class="metric"><span>줄 수</span><strong id="lineCount">0</strong></output>
          <output class="metric"><span>예상 읽기</span><strong id="readTime">0초</strong></output>
        </div>
      </section>
    </div>
  </main>
  <script src="../app.js" defer></script>
</body>
</html>
